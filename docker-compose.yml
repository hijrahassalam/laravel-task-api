services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-task-api-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - laravel-task-api

  nginx:
    image: nginx:alpine
    container_name: laravel-task-api-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel-task-api

  mysql:
    image: mysql:8.0
    container_name: laravel-task-api-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - laravel-task-api

networks:
  laravel-task-api:
    driver: bridge

volumes:
  mysql-data:
